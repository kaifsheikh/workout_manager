<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym & Workout Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
          --base-grid: 8px;
          --colour-white: #ffffff;
          --colour-black: #0b0b12;
          --accent: #ff6b3d;
          --accent-glow: rgba(255, 107, 61, 0.5);
        }

        /* Mobile Responsiveness: shrink the grid base so the radial layout fits smaller screens perfectly */
        @media (max-width: 600px) {
          :root {
            --base-grid: 5.5px;
          }
        }

        *, :after, :before {
            box-sizing: border-box;
        }

        html {
          margin: 0;
          padding: 0;
        }

        body {
          margin: 0;
          padding: 0;
          min-height: 100vh;
          font-family: 'Outfit', sans-serif;
          background-color: var(--colour-black);
          background-image: 
            radial-gradient(circle at 20% 30%, rgba(255, 107, 61, 0.15) 0%, transparent 40%),
            radial-gradient(circle at 80% 70%, rgba(30, 144, 255, 0.1) 0%, transparent 40%),
            radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.02) 0%, transparent 60%);
          color: var(--colour-white);
          overflow: hidden; /* Prevent scrolling from radial layout if edge touches */
        }

        /* Subtle animated background grid for modern feel */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        .links {
          --link-size: calc(var(--base-grid) * 20);
          display: flex;
          justify-content: center;
          align-items: center;
          width: 100%;
          min-height: 100vh;
          position: relative;
        }

        /* Glowing center orb */
        .links::before {
            content: '';
            position: absolute;
            width: calc(var(--base-grid) * 15);
            height: calc(var(--base-grid) * 15);
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0.4;
            filter: blur(20px);
            animation: pulse-orb 4s ease-in-out infinite alternate;
        }

        @keyframes pulse-orb {
            0% { transform: scale(0.8); opacity: 0.2; }
            100% { transform: scale(1.2); opacity: 0.5; }
        }

        .links__list {
          position: relative;
          list-style: none;
          margin: 0;
          padding: 0;
        }

        .links__item {
          width: var(--link-size);
          height: var(--link-size);
          position: absolute;
          top: 0;
          left: 0;
          margin-top: calc(var(--link-size) / -2);
          margin-left: calc(var(--link-size) / -2);
          --angle: calc(360deg / var(--item-total));
          --rotation: calc(140deg + var(--angle) * var(--item-count));
          transform: rotate(var(--rotation)) translate(calc(var(--link-size) + var(--base-grid) * 2)) rotate(calc(var(--rotation) * -1));
        }

        .links__link {
          opacity: 0;
          animation: on-load .6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
          animation-delay: calc(var(--item-count) * 150ms);
          width: 100%;
          height: 100%;
          border-radius: 50%;
          position: relative;
          background: rgba(255, 255, 255, 0.05);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          border: 1px solid rgba(255, 255, 255, 0.15);
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          text-decoration: none;
          color: var(--colour-white);
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
          transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease;
        }

        .links__icon {
          width: calc(var(--base-grid) * 7);
          height: calc(var(--base-grid) * 7);
          transition: all .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
          fill: var(--colour-white);
          filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .links__text {
          position: absolute;
          width: 100%;
          left: 0;
          text-align: center;
          font-weight: 600;
          letter-spacing: 1px;
          text-transform: uppercase;
          height: calc(var(--base-grid) * 2);
          font-size: calc(var(--base-grid) * 2);
          display: none;
          bottom: calc(var(--base-grid) * 7);
          animation: text-appear .3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
          text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .links__link:after {
          content: "";
          background-color: transparent;
          width: var(--link-size);
          height: var(--link-size);
          border: 2px dashed rgba(255, 107, 61, 0.6);
          display: block;
          border-radius: 50%;
          position: absolute;
          top: 0;
          left: 0;
          transition: all .4s cubic-bezier(.53,-.67,.73,.74);
          transform: none;
          opacity: 0;
          box-shadow: 0 0 20px var(--accent-glow) inset;
        }

        .links__link:hover {
          transform: scale(1.05);
          box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7), 0 0 20px rgba(255, 107, 61, 0.2);
          border-color: rgba(255, 107, 61, 0.5);
          background: rgba(255, 255, 255, 0.08);
        }

        .links__link:hover .links__icon {
          transform: translateY(calc(var(--base-grid) * -2)) scale(1.1);
          fill: var(--accent);
        }

        .links__link:hover .links__text {
          display: block;
          color: var(--accent);
        }

        .links__link:hover:after {
          transition: all .4s cubic-bezier(.37,.74,.15,1.65);
          transform: scale(1.15);
          opacity: 1;
          animation: spin-dashed 10s linear infinite;
        }

        @keyframes spin-dashed {
            100% { transform: scale(1.15) rotate(360deg); }
        }

        @keyframes on-load {
          0% {
            opacity: 0;
            transform: scale(.3);
          }
          70% {
            opacity: .7;
            transform: scale(1.1);
          }
          100% {
            opacity: 1;
            transform: scale(1);
          }
        }

        @keyframes text-appear {
          0% {
            opacity: 0;
            transform: scale(0.5) translateY(10px);
          }
          100% {
            opacity: 1;
            transform: scale(1) translateY(calc(var(--base-grid) * 4));
          }
        }
    </style>
</head>
<body>
    <div class="links">
  <ul class="links__list" style="--item-total:5">
    <li class="links__item" style="--item-count:1">
      <a class="links__link" href="./routine/index.html">
       <svg class="links__icon" viewBox="0 0 32 32">
      <path d="M2 28h28v2h-28zM4 26h2v-20h-2zM9 26h2v-20h-2zM14 26h2v-20h-2zM19 26h2v-20h-2zM24 26h2v-20h-2zM29 26h-1v-20h2v20z"></path>
    </svg>
        <span class="links__text">Track</span>
      </a>
    </li>

    <li class="links__item" style="--item-count:5">
      <!-- Mapped to your actual workout app -->
      <a class="links__link" href="workout/index.html">
         <svg class="links__icon" viewBox="0 0 32 32">
      <path d="M29.5 4h-27c-1.381 0-2.5 1.119-2.5 2.5v19c0 1.381 1.119 2.5 2.5 2.5h27c1.381 0 2.5-1.119 2.5-2.5v-19c0-1.381-1.119-2.5-2.5-2.5zM3 25v-17h26v17h-26zM7 7h2v18h-2v-18zM12 10h2v15h-2v-15zM17 7h2v18h-2v-18zM22 12h2v13h-2v-13z"></path>
    </svg>
        <span class="links__text">Workout</span></a>
    </li>
  </ul>
</div>
</body>
</html>

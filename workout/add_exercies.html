<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>➕ Add Exercises – Gym Library</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* same styles as before – keep them */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0b0e14; color: #eef2f7; padding: 2rem 1.5rem; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-link { display: inline-block; margin-bottom: 1.5rem; color: #ff8c5a; text-decoration: none; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
        h1 { font-weight: 600; font-size: 1.8rem; margin-bottom: 0.3rem; }
        .subtitle { color: #9aa4b8; margin-bottom: 1.8rem; font-size: 0.95rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: #141a22; border: 1px solid #242b36; border-radius: 16px; padding: 1rem 0.6rem; text-align: center; }
        .stat-card .number { font-size: 2rem; font-weight: 700; color: #ff8c5a; }
        .stat-card .label { font-size: 0.78rem; color: #9aa4b8; margin-top: 0.2rem; }
        .muscle-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }

        .form-card { background: #141a22; border: 1px solid #242b36; border-radius: 20px; padding: 1.8rem 2rem; margin-bottom: 2rem; }
        .form-card h2 { font-size: 1.2rem; font-weight: 500; margin-bottom: 1rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; color: #9aa4b8; letter-spacing: 0.3px; }
        .form-group input, .form-group select { background: #0b0e14; border: 1px solid #2a303c; border-radius: 10px; padding: 0.6rem 0.9rem; color: #eef2f7; font-size: 0.95rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #ff8c5a; }
        .form-group .hint { font-size: 0.7rem; color: #5a647a; }
        .form-actions { grid-column: 1 / -1; display: flex; gap: 1rem; margin-top: 0.3rem; flex-wrap: wrap; }

        .btn { background: #1f2530; border: none; padding: 0.6rem 1.4rem; border-radius: 30px; color: #eef2f7; font-weight: 500; cursor: pointer; transition: background 0.2s; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; }
        .btn:hover { background: #2d3440; }
        .btn-primary { background: #ff8c5a; color: #0b0e14; border-color: #ff8c5a; }
        .btn-primary:hover { background: #ff7a42; }
        .btn-success { background: #2e7d5e; border-color: #3a9b74; color: #fff; }
        .btn-success:hover { background: #3a9b74; }
        .btn-outline { background: transparent; border-color: #3a4050; }
        .btn-outline:hover { background: #1f2530; }
        .btn-danger { background: #8b2f3f; border-color: #b03a4e; color: #fff; }
        .btn-danger:hover { background: #b03a4e; }
        .btn-sm { padding: 0.35rem 1rem; font-size: 0.8rem; }

        .import-export { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .hidden-input { display: none; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1f2530; border: 1px solid #3a4050; padding: 0.7rem 2rem; border-radius: 40px; color: #eef2f7; font-weight: 500; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 999; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 700px) { .form-grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 450px) { .stats-grid { grid-template-columns: 1fr 1fr; } .container { padding: 0; } .form-card { padding: 1.2rem; } }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Back to Library</a>
    <h1>➕ Add &amp; Manage Exercises</h1>
    <p class="subtitle">
        Data is stored <strong>only in memory</strong>. Use <strong>Export</strong> to download a JSON file, and <strong>Import</strong> to load one.
    </p>

    <!-- STATISTICS -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- IMPORT / EXPORT -->
    <div class="import-export">
        <button class="btn btn-success" onclick="exportJSON()">📥 Export JSON</button>
        <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">📤 Import JSON</button>
        <input type="file" id="fileInput" class="hidden-input" accept=".json" onchange="importJSON(event)" />
        <button class="btn btn-danger" onclick="resetToDefault()">🔄 Reset to Default</button>
    </div>

    <!-- ADD FORM -->
    <div class="form-card">
        <h2>➕ Add New Exercise</h2>
        <form id="addForm" onsubmit="addExercise(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label>Exercise Name *</label>
                    <input type="text" id="exName" placeholder="e.g. Incline Dumbbell Press" required />
                </div>
                <div class="form-group">
                    <label>Muscle *</label>
                    <select id="exMuscle" required>
                        <option value="Chest">Chest</option>
                        <option value="Back">Back</option>
                        <option value="Biceps">Biceps</option>
                        <option value="Triceps">Triceps</option>
                        <option value="Shoulders">Shoulders</option>
                        <option value="Legs">Legs</option>
                        <option value="Abs">Abs</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <input type="text" id="exCategory" placeholder="e.g. Upper Chest" required />
                </div>
                <div class="form-group">
                    <label>Target Muscle *</label>
                    <input type="text" id="exTarget" placeholder="e.g. Upper Chest" required />
                </div>
                <div class="form-group">
                    <label>Type *</label>
                    <select id="exType" required>
                        <option value="Hypertrophy">Hypertrophy</option>
                        <option value="Strength">Strength</option>
                        <option value="Endurance">Endurance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Sets *</label>
                    <input type="number" id="exSets" placeholder="4" required min="1" />
                </div>
                <div class="form-group">
                    <label>Reps *</label>
                    <input type="text" id="exReps" placeholder="8–12" required />
                </div>
                <div class="form-group">
                    <label>Rest Time *</label>
                    <input type="text" id="exRest" placeholder="60 sec" required />
                </div>
                <div class="form-group">
                    <label>Movement</label>
                    <select id="exMovement">
                        <option value="Compound">Compound</option>
                        <option value="isolation">Isolation</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Image URLs (comma separated)</label>
                    <input type="text" id="exImages" placeholder="images/chest/flat.png, images/chest/chest.png" />
                    <span class="hint">Leave empty for placeholder</span>
                </div>
                <div class="form-group">
                    <label>Alternative IDs (comma separated)</label>
                    <input type="text" id="exAlt" placeholder="2, 4" />
                    <span class="hint">IDs of existing exercises</span>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">➕ Add Exercise</button>
                    <button type="reset" class="btn btn-outline">🧹 Clear Fields</button>
                </div>
            </div>
        </form>
    </div>

    <div class="toast" id="toast"></div>
</div>

<script>
    // ================================================================
    //  NO localStorage – data only in memory
    // ================================================================
    let exercisesData = [];

    // ================================================================
    //  LOAD DATA (from workout.json if exists, else empty)
    // ================================================================
    function loadData() {
        fetch('./json/workout.json')
            .then(res => res.json())
            .then(data => {
                exercisesData = data;
                renderStats();
            })
            .catch(() => {
                exercisesData = [];
                renderStats();
                showToast('⚠️ workout.json not found – starting empty.', 2500);
            });
    }

    // ================================================================
    //  RENDER STATISTICS
    // ================================================================
    function renderStats() {
        const grid = document.getElementById('statsGrid');
        const total = exercisesData.length;

        const muscleMap = {};
        const muscles = ['Chest', 'Back', 'Biceps', 'Triceps', 'Shoulders', 'Legs', 'Abs'];
        muscles.forEach(m => muscleMap[m] = 0);
        exercisesData.forEach(ex => {
            if (muscleMap.hasOwnProperty(ex.muscle)) muscleMap[ex.muscle]++;
            else muscleMap[ex.muscle] = 1;
        });

        const colorMap = {
            'Chest': '#e67e22',
            'Back': '#3498db',
            'Biceps': '#e74c3c',
            'Triceps': '#9b59b6',
            'Shoulders': '#1abc9c',
            'Legs': '#f1c40f',
            'Abs': '#2ecc71'
        };

        let html =
            `<div class="stat-card"><div class="number">${total}</div><div class="label">📦 Total Exercises</div></div>`;

        muscles.forEach(m => {
            const count = muscleMap[m] || 0;
            const dot = `<span class="muscle-dot" style="background:${colorMap[m]};"></span>`;
            html +=
                `<div class="stat-card"><div class="number">${count}</div><div class="label">${dot} ${m}</div></div>`;
        });

        grid.innerHTML = html;
    }

    // ================================================================
    //  ADD EXERCISE (memory only)
    // ================================================================
    function getNextId() {
        if (exercisesData.length === 0) return 1;
        return Math.max(...exercisesData.map(e => e.id)) + 1;
    }

    function addExercise(e) {
        e.preventDefault();

        const name = document.getElementById('exName').value.trim();
        const muscle = document.getElementById('exMuscle').value;
        const category = document.getElementById('exCategory').value.trim();
        const target = document.getElementById('exTarget').value.trim();
        const type = document.getElementById('exType').value;
        const sets = parseInt(document.getElementById('exSets').value);
        const reps = document.getElementById('exReps').value.trim();
        const rest = document.getElementById('exRest').value.trim();
        const movement = document.getElementById('exMovement').value;

        const imagesRaw = document.getElementById('exImages').value.trim();
        const images = imagesRaw ? imagesRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

        const altRaw = document.getElementById('exAlt').value.trim();
        const altIds = altRaw ? altRaw.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n)) : [];

        if (!name || !category || !target || !reps || !rest || isNaN(sets) || sets < 1) {
            showToast('⚠️ Please fill all required fields correctly.', 2500);
            return;
        }

        if (exercisesData.some(e => e.exerciseName.toLowerCase() === name.toLowerCase())) {
            showToast('⚠️ An exercise with this name already exists.', 2500);
            return;
        }

        const newExercise = {
            id: getNextId(),
            images,
            muscle,
            category,
            exerciseName: name,
            alternative_id: altIds,
            targetMuscle: target,
            type,
            sets,
            reps,
            restTime: rest,
            compoundMovement: movement
        };

        exercisesData.push(newExercise);
        renderStats();
        document.getElementById('addForm').reset();
        document.getElementById('exImages').value = '';
        document.getElementById('exAlt').value = '';
        showToast(`✅ "${name}" added (ID: ${newExercise.id}) — now EXPORT to save to file.`, 3000);
        console.log('➕ Added (memory):', newExercise);
    }

    // ================================================================
    //  EXPORT
    // ================================================================
    function exportJSON() {
        if (exercisesData.length === 0) {
            showToast('⚠️ No data to export.', 2000);
            return;
        }
        const blob = new Blob([JSON.stringify(exercisesData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'workout.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast(`📥 Exported ${exercisesData.length} exercises.`, 2000);
    }

    // ================================================================
    //  IMPORT
    // ================================================================
    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (!Array.isArray(data)) throw new Error('Not an array');
                if (data.length > 0 && !data[0].id) throw new Error('Invalid format: missing "id"');
                exercisesData = data;
                renderStats();
                showToast(`📤 Imported ${data.length} exercises!`, 2500);
            } catch (err) {
                showToast(`❌ Import failed: ${err.message}`, 3000);
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    // ================================================================
    //  RESET (fetch workout.json again)
    // ================================================================
    async function resetToDefault() {
        if (!confirm('⚠️ Replace all current data with the default workout.json?')) return;
        try {
            const resp = await fetch('./workout.json');
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            exercisesData = data;
            renderStats();
            showToast(`🔄 Reset to default (${data.length} exercises)`, 2000);
        } catch (err) {
            showToast(`❌ Reset failed: ${err.message}`, 2500);
        }
    }

    // ================================================================
    //  TOAST
    // ================================================================
    function showToast(msg, duration = 2500) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.classList.remove('show'), duration);
    }

    // ================================================================
    //  INIT
    // ================================================================
    loadData();
</script>
</body>
</html>
